services:
  db:
    image: postgres:16-alpine
    container_name: filefinder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       filefinder
      POSTGRES_USER:     filefinder
      POSTGRES_PASSWORD: filefinder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filefinder -d filefinder"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres_data:
    driver: local
